<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>DOM CSS Manipulation</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 20px; }
    .highlight { color: blue; font-weight: bold; }
    .hidden { display: none; }
    .big-text { font-size: 24px; }
    .red-bg { background-color: red; color: white; }
  </style>
</head>
<body>
  <h2 id="main-heading">This is h2</h2>
  <p id="first-para">This is the first paragraph.</p>

  <!-- Buttons to trigger CSS changes -->
  <button id="style-btn">Change Style</button>
  <button id="class-btn">Toggle Class</button>
  <button id="computed-btn">Get Computed Style</button>
  <button id="remove-style-btn">Remove Style</button>

  <script src="script.js"></script>
</body>
</html>
