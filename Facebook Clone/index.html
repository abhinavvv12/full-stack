<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Facebook clone</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="main-container">
        <div class="navbar">
            <div class="title-search">
                <img src="images/Facebook-logo.png" alt="">
                <input type="text" placeholder="Search Facebook">
            </div>
            <div class="items">
                <div class="item">
                    <a href="#">
                        <img src="images/home.png" alt="">
                        <!-- <p>Home</p> -->
                    </a>
                </div>

                <div class="item">
                    <a href="#">
                        <img src="images/video.png" alt="">
                        <!-- <p>Video</p> -->
                    </a>
                </div>
                <div class="item">
                    <a href="#">
                        <img src="images/arketplace.png" alt="">
                        <!-- <p>MarketPlace</p> -->
                    </a>
                </div>
                <div class="item">
                    <a href="#">
                        <img src="images/groups.png" alt="">
                        <!-- <p>Groups</p> -->
                    </a>
                </div>
                <div class="item">
                    <a href="#">
                        <img src="images/gaming.png" alt="">
                        <!-- <p>Gaming</p> -->
                    </a>
                </div>
            </div>
            <div class="options">
                <div class="option">
                    <a href="#">
                        <img src="images/plus.png" alt="">
                        <!-- <p>Post</p> -->
                    </a>
                </div>
                <div class="option">
                    <a href="#">
                        <img src="images/notf.png" alt="">
                        <!-- <p>Notifications</p> -->
                    </a>
                </div>
                <div class="option">
                    <a href="#">
                    <img src="images/messenger.png" alt="">
                    <!-- <p>Messsnger</p> -->
                </a>
                </div>
                <div class="option">
                    <a href="#">
                    <img id="Profile" src="images/pfp.jpg" alt="">
                    <!-- <p>Profile</p> -->
                </a>
                </div>
            </div>
        </div>
        <div class="stories">
            <div id="story1" class="story">
                <img class="story" src="images/story1.jpg" alt="">
                <img class="pf" src="images/pfp1.jpg" alt="">
            </div>
            <div id="story2" class="story">
                <img class="story" src="images/story2.jpeg" alt="">
                <img class="pf" src="images/pfp2.jpg" alt="">
            </div>
            <div id="story3" class="story">
                <img class="story" src="images/story3.jpeg" alt="">
                <img class="pf" src="images/pfp3.jpg" alt="">
            </div>
            <div id="story4" class="story">
                <img class="story" src="images/story4.jpeg" alt="">
                <img class="pf" src="images/p4.jpg" alt="">
            </div>
            <div id="story5" class="story">
                <img class="story" src="images/story5.jpeg" alt="">
                <img class="pf" src="images/pfp5.jpg" alt="">
            </div>
        </div>
    </div>
</body>

</html>
