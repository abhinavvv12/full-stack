<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Facebook clone</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="main-container">
        <div class="navbar">
            <div class="title-search">
                <img src="images/Facebook-logo.png" alt="">
                <input type="text" placeholder="Search Facebook">
            </div>
            <div class="items">
                <a href="#">
                    <img src="images/home.png" alt="">
                </a>
                <a href="#">
                    <img src="images/video.png" alt="">
                </a>
                <a href="#">
                    <img src="images/arketplace.png" alt="">
                </a>
                <a href="#">
                    <img src="images/groups.png" alt="">
                </a>
                <a href="#">
                    <img src="images/gaming.png" alt="">
                </a>
            </div>
            <div class="options">
                <a href="#">
                    <img src="images/plus.png" alt="">
                </a>
                <a href="#">
                    <img src="images/notf.png" alt="">
                </a>
                <a href="#">
                    <img src="images/messenger.png" alt="">
                </a>
                <a href="#">
                    <img src="images/pfp.jpg" alt="">
                </a>
            </div>
        </div>
        <div class="stories">
            <div id="story1" class="story">
                <img src="images/story1.jpg" alt="">
                <img src="images/pfp1.jpg" alt="">
            </div>
            <div id="story2" class="story">
                <img src="images/story2.jpeg" alt="">
                <img src="images/pfp2.jpg" alt="">
            </div>
            <div id="story3" class="story">
                <img src="images/story3.jpeg" alt="">
                <img src="images/pfp3.jpg" alt="">
            </div>
            <div id="story4" class="story">
                <img src="images/story4.jpeg" alt="">
                <img src="images/p4.jpg" alt="">
            </div>
            <div id="story5" class="story">
                <img src="images/story5.jpeg" alt="">
                <img src="images/pfp5.jpg" alt="">
            </div>
        </div>
    </div>
</body>
</html>
