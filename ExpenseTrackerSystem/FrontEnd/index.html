
<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Expense Tracker System</title>

<link rel="stylesheet" href="style.css">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<script src="script.js"></script>

</head>

<body>

<!-- AUTH SECTION -->

<div class="auth-container" id="authContainer">

    <div class="auth-box">

        <h1>Expense Tracker</h1>

        <h2 id="formTitle">Login</h2>

        <form id="authForm">

            <input
                type="email"
                id="email"
                placeholder="Enter Email"
                required
            >

            <input
                type="password"
                id="password"
                placeholder="Enter Password"
                required
            >

            <button type="submit">
                Submit
            </button>

        </form>

        <p id="message"></p>

        <button class="switch-btn" onclick="toggleForm()">
            Switch to Register
        </button>

    </div>

</div>

<!-- MAIN APP -->

<div class="app hidden" id="appContainer">

    <!-- SIDEBAR -->

    <aside class="sidebar">

        <h2>Expense Tracker</h2>

        <ul>
            <li onclick="showSection('dashboardSection')">Dashboard</li>
            <li onclick="showSection('addSection')">Add Transaction</li>
            <li onclick="showSection('transactionSection')">Transactions</li>
            <li onclick="showSection('analyticsSection')">Analytics</li>
            <li onclick="logout()">Logout</li>
        </ul>

    </aside>

    <!-- MAIN CONTENT -->

    <main class="main-content">

        <!-- DASHBOARD -->

        <section id="dashboardSection" class="section active-section">

            <h1>Dashboard</h1>

            <div class="cards">

                <div class="card income-card">
                    <h3>Total Income</h3>
                    <p id="income">₹0</p>
                </div>

                <div class="card expense-card">
                    <h3>Total Expense</h3>
                    <p id="expense">₹0</p>
                </div>

                <div class="card balance-card">
                    <h3>Balance</h3>
                    <p id="balance">₹0</p>
                </div>

            </div>

        </section>

        <!-- ADD TRANSACTION -->

        <section id="addSection" class="section hidden">

            <h1>Add Transaction</h1>

            <div class="form-container">

                <input
                    type="text"
                    id="title"
                    placeholder="Transaction Title"
                >

                <input
                    type="number"
                    id="amount"
                    placeholder="Amount"
                >

                <select id="type">
                    <option value="income">Income</option>
                    <option value="expense">Expense</option>
                </select>

                <select id="category">
                    <option value="Food">Food</option>
                    <option value="Transport">Transport</option>
                    <option value="Shopping">Shopping</option>
                    <option value="Bills">Bills</option>
                    <option value="Others">Others</option>
                </select>

                <button onclick="addTransaction()">
                    Add Transaction
                </button>

            </div>

        </section>

        <!-- TRANSACTIONS -->

        <section id="transactionSection" class="section hidden">

            <h1>Transactions</h1>

            <div class="transaction-list">
                <ul id="transactionList"></ul>
            </div>

        </section>

        <!-- ANALYTICS -->

        <section id="analyticsSection" class="section hidden">

            <h1>Analytics</h1>

            <div class="chart-box">
                <canvas id="pieChart"></canvas>
            </div>

        </section>

    </main>

</div>

<script src="script.js"></script>

</body>
</html>
