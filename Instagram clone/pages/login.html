<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Page</title>
    <link rel="stylesheet" href="../css/login.css">
</head>

<body>
    <div class="main-container">

        <div class="login-page">

            <div class="phone-mockup">
                <img src="images/photo-mockup.jpg" alt="phone-mockup">
            </div>

            <div class="login-box">

                <img id="logo" src="images/ins.png" alt="instagram">

                <input id="username" class="input-field" type="text" placeholder="Username">

                <input id="password" class="input-field" type="password" placeholder="password">

                <a class="input-field" id="submit" href="">
                   Login
                </a>

                <div class="divider" id="or" >
                    <p> OR </p>
                </div>

                <div class="facebook-login">
                    <img src="" alt="">
                    <p>Login with <a href="">Facebook</a> </p>
                </div>

                <a class="forgot-password" href="">Forgot Password?</a>

                <div class="signup-box">
                    <p>Don't have an account? <a href="">Sign up</a> </p>

                    <div class="app-download">
                        <p>Get the App</p>
                        <div class="images">
                            <a href="">
                                <img src="" alt="">
                            </a>
                            <a href="">
                                <img src="" alt="">
                            </a>
                        </div>
                    </div>
                </div>
            </div>
        </div>
</body>

</html>
