<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS Units</title>
    <style>
        body {
            background-color: black;
            color: white;
        }

        .container {
            /* width: 500px;
            height: 500px; */
            height: 100vh;
            background-color: pink;
            font-size: 1em;
            border: 1rem solid white;
        }

        .box {
            height: 100px;
            width: 100px;
            background-color: blue;
            color: pink;
            font-size: 10pt;
            border: 0.1cm solid orange;
        }
    </style>
</head>

<body>
    <h1>CSS Units</h1>
    <div class="container">
        <p>Lorem ipsum dolor, sit amet consectetur adipisicing elit. Quisquam, numquam?</p>
        <div class="box">
            <p>This is a box</p>
        </div>
    </div>


</body>

</html>
